name: CI

on: [push, pull_request]

jobs:
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Create venv and install dependencies
        run: |
          python -m venv venv
          . venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Archive venv
        run: tar -czf python-venv.tar.gz venv

      - name: Upload venv artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-venv
          path: python-venv.tar.gz

  fmt:
    name: Format Check (black)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: python-venv
          path: .

      - name: Extract venv
        run: tar -xzf python-venv.tar.gz

      - name: Run black (check only)
        run: |
          . venv/bin/activate
          make fmt-ci

  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: python-venv
          path: .

      - name: Extract venv
        run: tar -xzf python-venv.tar.gz

      - name: Run ruff
        run: |
          . venv/bin/activate
          make ruff

  pylint:
    name: Lint (pylint)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: python-venv
          path: .

      - name: Extract venv
        run: tar -xzf python-venv.tar.gz

      - name: Run pylint
        run: |
          . venv/bin/activate
          make pylint

  mypy:
    name: Lint (mypy)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: python-venv
          path: .

      - name: Extract venv
        run: tar -xzf python-venv.tar.gz

      - name: Run mypy
        run: |
          . venv/bin/activate
          make mypy

  bandit:
    name: Security Check (bandit)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: python-venv
          path: .

      - name: Extract venv
        run: tar -xzf python-venv.tar.gz

      - name: Run bandit
        run: |
          . venv/bin/activate
          make bandit

  test:
    name: Unit Tests (unittest)
    runs-on: ubuntu-latest
    needs: [setup, fmt, ruff, pylint, mypy, bandit]
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: python-venv
          path: .

      - name: Extract venv
        run: tar -xzf python-venv.tar.gz

      - name: Run unittest
        run: |
          . venv/bin/activate
          python -m unittest discover -s tests -p "test_*.py"
